{{ define "main" }}
<h1>{{ .Title }}</h1>
{{ .Content }}
{{ range .Pages }}
<article class="post-preview">
  <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
  <time>{{ .Date.Format "January 2, 2006" }}</time>
  {{ if .Params.category }}<span class="category">{{ .Params.category }}</span>{{ end }}
  <p>{{ .Summary }}</p>
  <a href="{{ .Permalink }}" class="read-more">Read the full breakdown →</a>
</article>
{{ end }}
{{ template "_internal/pagination.html" . }}
{{ end }}
