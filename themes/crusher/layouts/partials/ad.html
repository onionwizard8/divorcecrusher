{{ if and .Site.Params.ads_enabled .Site.Params.adsense_id }}
<div class="ad-slot" data-position="{{ .position | default "inline" }}">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="{{ .Site.Params.adsense_id }}"
       data-ad-slot="{{ .slot | default "" }}"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
{{ end }}
